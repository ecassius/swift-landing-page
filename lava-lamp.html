<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blent — Lava Blob</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:400vh;background:#f5f0eb}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.demo-section{height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:2.5vw;font-weight:200;color:rgba(0,0,0,0.12);user-select:none}
.hero{background:linear-gradient(140deg,#ffd6e5 0%,#ffb3c6 42%,#f07060 100%)}
.demo-section:nth-child(2){background:#1a1a2e;color:rgba(255,255,255,0.1)}
.demo-section:nth-child(3){background:#fff}
.demo-section:nth-child(4){background:#ffd6e5;color:rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div class="demo-section hero">hero section</div>
<div class="demo-section">dark section</div>
<div class="demo-section">white section</div>
<div class="demo-section">pink section</div>

<canvas id="lava-canvas"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('lava-canvas');
const gl = canvas.getContext('webgl', {alpha: true, premultipliedAlpha: false, antialias: false});
if (!gl) return;

const VS = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_center;  // blob center position
uniform float u_radius;  // blob base radius

// --- Noise ---
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float hash2(vec2 p){return fract(sin(dot(p,vec2(269.5,183.3)))*43758.5453);}

float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*f*(f*(f*6.0-15.0)+10.0); // quintic interp for smoothness
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}

float fbm(vec2 p){
  float v=0.0, a=0.5;
  mat2 rot=mat2(0.8,0.6,-0.6,0.8); // rotate each octave
  for(int i=0;i<5;i++){
    v+=a*noise(p);
    p=rot*p*2.0;
    a*=0.5;
  }
  return v;
}

// The blob shape: distance from center, distorted by noise
// Returns <0 inside, >0 outside
float blobField(vec2 p, vec2 center, float radius){
  vec2 d = p - center;
  float dist = length(d);

  // Angle for polar noise distortion
  float angle = atan(d.y, d.x);

  // Large-scale bulges — makes it very non-spherical
  float bulge = fbm(vec2(angle*1.5, u_time*0.12) + center*0.5) * 0.45;
  // Medium globular lumps
  float lump = fbm(vec2(angle*3.0, u_time*0.08 + 10.0) + center) * 0.2;
  // Fine surface wobble
  float fine = noise(vec2(angle*6.0, u_time*0.15 + 20.0)) * 0.08;

  float distorted_radius = radius + radius*(bulge + lump + fine - 0.3);

  return dist - distorted_radius;
}

void main(){
  vec2 uv = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 p = vec2(uv.x * aspect, uv.y);

  float sdf = blobField(p, u_center, u_radius);

  // SHARP edge — no blur
  if(sdf > 0.003){
    gl_FragColor = vec4(0,0,0,0);
    return;
  }

  // Very thin anti-alias band (sharp but not jagged)
  float alpha = smoothstep(0.003, -0.002, sdf);

  // --- Normal from SDF gradient ---
  float eps = 0.004;
  float gx = blobField(p+vec2(eps,0), u_center, u_radius)
           - blobField(p-vec2(eps,0), u_center, u_radius);
  float gy = blobField(p+vec2(0,eps), u_center, u_radius)
           - blobField(p-vec2(0,eps), u_center, u_radius);
  vec3 normal = normalize(vec3(-gx, -gy, 0.35));

  // --- Surface texture: oily viscous detail ---
  float turb1 = fbm(p * 8.0 + u_time * 0.06);
  float turb2 = fbm(p * 14.0 - u_time * 0.04 + vec2(5.0, 3.0));

  // --- Lighting: two-point for oily wet sheen ---
  vec3 L1 = normalize(vec3(0.5, -0.4, 1.0));
  vec3 L2 = normalize(vec3(-0.5, 0.4, 0.8));
  vec3 V  = vec3(0, 0, 1);

  float diff1 = max(dot(normal, L1), 0.0);
  float diff2 = max(dot(normal, L2), 0.0);
  float spec1 = pow(max(dot(reflect(-L1, normal), V), 0.0), 60.0);
  float spec2 = pow(max(dot(reflect(-L2, normal), V), 0.0), 40.0);
  float fresnel = pow(1.0 - max(dot(normal, V), 0.0), 3.0);

  // --- Color: #5E4ADA purple ---
  vec3 purple = vec3(0.369, 0.290, 0.855);
  vec3 deep   = vec3(0.14, 0.08, 0.40);
  vec3 lite   = vec3(0.50, 0.42, 0.96);

  float diffuse = diff1 * 0.7 + diff2 * 0.3;
  vec3 col = mix(deep, purple, 0.3 + 0.7 * diffuse);

  // Oily color shift from turbulence
  col = mix(col, lite, turb1 * 0.12 + turb2 * 0.06);

  // Specular highlights — wet oil sheen
  col += vec3(1.0, 0.96, 0.92) * (spec1 * 0.85 + spec2 * 0.4);

  // Fresnel rim
  col += purple * fresnel * 0.25;

  // Surface micro-texture
  col *= 0.92 + 0.08 * turb1;

  // Depth darkening near edge
  float edgeDepth = smoothstep(0.0, -0.08, sdf);
  col *= 0.65 + 0.35 * edgeDepth;

  gl_FragColor = vec4(col * alpha, alpha);
}
`;

function mkShader(t,src){
  const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

const uRes    = gl.getUniformLocation(prog,'u_res');
const uTime   = gl.getUniformLocation(prog,'u_time');
const uCenter = gl.getUniformLocation(prog,'u_center');
const uRadius = gl.getUniformLocation(prog,'u_radius');

// ==========================================================
//  PHYSICS — single blob, slow, viscous
// ==========================================================

let w=0, h=0, aspect=1;
let scrollY=0, prevScrollY=0, scrollVelSmooth=0;
let startTime=0;

// Blob state
let blobX=0, blobY=0, blobVX=0, blobVY=0;
let blobRadius=0; // grows during pour
const BASE_RADIUS = 0.22;
let pourDone = false;

window.addEventListener('scroll', ()=>{ scrollY=window.scrollY; }, {passive:true});

function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 1.5);
  w=window.innerWidth; h=window.innerHeight;
  canvas.width  = Math.floor(w*dpr*0.75);
  canvas.height = Math.floor(h*dpr*0.75);
  aspect = w/h;
  gl.viewport(0,0,canvas.width,canvas.height);
  blobX = aspect*0.5;
}
resize();
window.addEventListener('resize', resize);

function animate(ts){
  requestAnimationFrame(animate);
  if(!startTime) startTime=ts;
  const t = (ts-startTime)*0.001;

  const scrollVelY = scrollY - prevScrollY;
  prevScrollY = scrollY;
  scrollVelSmooth += (scrollVelY - scrollVelSmooth) * 0.06;

  const cx = aspect * 0.5;

  // Scroll offset in GL units (slow: 0.4 per viewport)
  const scrollGL = -(scrollY / h) * 0.4;

  // --- POUR: blob grows from 0 to full size over ~3 seconds ---
  if(!pourDone){
    // Starts from top (y=1.1), slides to center (y=0.5)
    const pourT = Math.min(t / 3.0, 1.0);
    const ease = pourT < 0.5
      ? 4*pourT*pourT*pourT
      : 1 - Math.pow(-2*pourT+2, 3)/2; // ease-in-out cubic

    blobY = 1.1 + (0.5 - 1.1) * ease;
    blobX = cx;
    blobRadius = BASE_RADIUS * ease;

    if(pourT >= 1.0) pourDone = true;
  }

  // --- SCROLL FOLLOW ---
  if(pourDone){
    const targetX = cx + Math.sin(t*0.25)*0.04;
    const targetY = 0.5 + scrollGL + Math.cos(t*0.18)*0.02;

    // Very slow spring + heavy drag = viscous
    blobVX += (targetX - blobX) * 0.004;
    blobVY += (targetY - blobY) * 0.004;
    blobVX += scrollVelSmooth * 0.000015;
    blobVX *= 0.94;
    blobVY *= 0.94;
    blobX += blobVX;
    blobY += blobVY;

    blobRadius = BASE_RADIUS;
  }

  // --- RENDER ---
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uCenter, blobX, blobY);
  gl.uniform1f(uRadius, blobRadius);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
