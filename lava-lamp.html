<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blent — Lava Blob</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:400vh;background:#f5f0eb}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.demo-section{height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:2.5vw;font-weight:200;color:rgba(0,0,0,0.12);user-select:none}
.hero{background:linear-gradient(140deg,#ffd6e5 0%,#ffb3c6 42%,#f07060 100%);position:relative}
.demo-section:nth-child(2){background:#1a1a2e;color:rgba(255,255,255,0.1)}
.demo-section:nth-child(3){background:#fff}
.demo-section:nth-child(4){background:#ffd6e5;color:rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div class="demo-section hero">hero section — blob pours in here</div>
<div class="demo-section">dark section — blob follows scroll</div>
<div class="demo-section">white section</div>
<div class="demo-section">pink section</div>

<canvas id="lava-canvas"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('lava-canvas');
const gl = canvas.getContext('webgl', {alpha: true, premultipliedAlpha: false, antialias: false});
if (!gl) return;

// --- SHADERS ---
const VS = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec3 u_blobs[16];
uniform int u_count;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<3;i++){v+=a*noise(p);p*=2.0;a*=0.5;}
  return v;
}

float field(vec2 p){
  float f=0.0;
  for(int i=0;i<16;i++){
    if(i>=u_count) break;
    vec2 d=p-u_blobs[i].xy;
    float r=u_blobs[i].z;
    f+=r*r/(dot(d,d)+0.00005);
  }
  return f;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float aspect=u_res.x/u_res.y;
  vec2 p=vec2(uv.x*aspect,uv.y);

  float f=field(p);

  float surface=smoothstep(0.92,1.08,f);
  if(surface<0.005){
    gl_FragColor=vec4(0,0,0,0);
    return;
  }

  float eps=0.002;
  float fx=field(p+vec2(eps,0))-field(p-vec2(eps,0));
  float fy=field(p+vec2(0,eps))-field(p-vec2(0,eps));
  vec3 normal=normalize(vec3(-fx,-fy,0.5));

  float turb=fbm(p*10.0+u_time*0.12);

  vec3 L1=normalize(vec3(0.5,-0.4,1.0));
  vec3 L2=normalize(vec3(-0.6,0.5,0.7));
  vec3 V=vec3(0,0,1);

  float d1=max(dot(normal,L1),0.0);
  float d2=max(dot(normal,L2),0.0);
  float s1=pow(max(dot(reflect(-L1,normal),V),0.0),50.0);
  float s2=pow(max(dot(reflect(-L2,normal),V),0.0),30.0);
  float fresnel=pow(1.0-max(dot(normal,V),0.0),2.5);

  vec3 purple=vec3(0.369,0.290,0.855);
  vec3 deep=vec3(0.18,0.12,0.50);
  vec3 lite=vec3(0.50,0.42,0.95);

  vec3 col=mix(deep,purple,0.4+0.6*(d1*0.7+d2*0.3));
  col=mix(col,lite,turb*0.12);
  col+=vec3(1.0,0.97,0.94)*(s1*0.75+s2*0.35);
  col+=purple*fresnel*0.25;
  col*=0.93+0.07*turb;

  float edge=smoothstep(0.92,1.6,f);
  col*=0.75+0.25*edge;

  float alpha=surface*0.95;
  gl_FragColor=vec4(col*alpha,alpha);
}
`;

// --- GL setup ---
function mkShader(t,src){
  const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'u_res');
const uTime=gl.getUniformLocation(prog,'u_time');
const uCount=gl.getUniformLocation(prog,'u_count');
const uBlobs=[];
for(let i=0;i<16;i++) uBlobs[i]=gl.getUniformLocation(prog,'u_blobs['+i+']');

// ==========================================================
//  BLOB PHYSICS — Pour → Pool → Scroll-follow
// ==========================================================

const HEAD_R   = 0.065;
const SEG_R    = 0.048;
const DROP_R   = 0.022;
const CHAIN_LEN = 6;
const MAX_DROPS = 8;
const TEAR_DIST = 0.20;
const GRAVITY   = -0.0012;  // for the pour phase

// Phases
const PHASE_POUR = 0;
const PHASE_POOL = 1;
const PHASE_FOLLOW = 2;

let phase = PHASE_POUR;
let pourTime = 0;

// Head starts above the screen (GL y > 1 = above viewport)
const head = { x: 0, y: 1.6, vx: 0, vy: 0 };

// Chain segments — stacked above head, staggered for stringy pour
const chain = [];
for (let i = 0; i < CHAIN_LEN; i++) {
  chain.push({
    x: 0,
    y: 1.6 + (i + 1) * 0.12, // staggered above
    vx: 0, vy: 0,
    r: SEG_R * (1 - i * 0.04),
    attached: true,
  });
}

const drops = [];

let scrollY = 0, prevScrollY = 0, scrollVelSmooth = 0;
let w = 0, h = 0, aspect = 1;
let startTime = 0;
let poolSettleTimer = 0;

window.addEventListener('scroll', () => { scrollY = window.scrollY; }, { passive: true });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  w = window.innerWidth; h = window.innerHeight;
  canvas.width  = Math.floor(w * dpr * 0.65);
  canvas.height = Math.floor(h * dpr * 0.65);
  aspect = w / h;
  gl.viewport(0, 0, canvas.width, canvas.height);

  // Center head horizontally
  if (phase === PHASE_POUR) {
    head.x = aspect * 0.5;
    for (const s of chain) s.x = head.x + (Math.random() - 0.5) * 0.03;
  }
}
resize();
window.addEventListener('resize', resize);

// Pool target: blob rests at bottom-center of the hero (GL y ≈ 0.12)
function poolTarget() {
  return { x: aspect * 0.5, y: 0.15 };
}

function animate(ts) {
  requestAnimationFrame(animate);
  if (!startTime) startTime = ts;
  const t = (ts - startTime) * 0.001;
  const dt = 1 / 60;

  const scrollVelY = scrollY - prevScrollY;
  prevScrollY = scrollY;
  scrollVelSmooth += (scrollVelY - scrollVelSmooth) * 0.12;

  const maxScroll = document.documentElement.scrollHeight - h;
  const scrollFrac = maxScroll > 0 ? scrollY / maxScroll : 0;

  // Where the blob "wants" to be vertically in GL space (0=bottom, 1=top)
  // scrollY=0 → bottom of hero (y≈0.15), scrolling moves it up/down with page
  const scrollOffsetY = -(scrollY / h) * 1.0; // each viewport scroll = 1.0 in GL

  // ======================
  //  PHASE: POUR
  // ======================
  if (phase === PHASE_POUR) {
    pourTime += dt;

    // Gravity pulls head down
    head.vy += GRAVITY;
    head.vy *= 0.985; // light air drag during fall
    head.x += head.vx;
    head.y += head.vy;

    // Slight wobble as it falls
    head.vx += Math.sin(t * 8) * 0.0001;
    head.vx *= 0.98;

    // Chain follows with springy delay — creates the stringy pour
    let leader = head;
    for (let i = 0; i < chain.length; i++) {
      const seg = chain[i];
      // Each segment starts falling after a stagger delay
      const segDelay = (i + 1) * 0.08;
      if (pourTime < segDelay) { leader = seg; continue; }

      seg.vy += GRAVITY;
      const dx = leader.x - seg.x;
      const dy = leader.y - seg.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      const rest = 0.05;
      if (d > rest) {
        const pull = (d - rest) * 0.12;
        seg.vx += (dx / d) * pull;
        seg.vy += (dy / d) * pull;
      }
      seg.vx *= 0.96;
      seg.vy *= 0.96;
      seg.x += seg.vx;
      seg.y += seg.vy;
      leader = seg;
    }

    // Transition to pool once head reaches hero bottom area
    if (head.y < 0.2) {
      head.vy *= 0.3; // dampen on "impact"
      phase = PHASE_POOL;
      poolSettleTimer = 0;
    }
  }

  // ======================
  //  PHASE: POOL (settle at hero boundary)
  // ======================
  if (phase === PHASE_POOL) {
    poolSettleTimer += dt;
    const pool = poolTarget();

    // Head settles into pool position with damped spring
    head.vx += (pool.x - head.x) * 0.02;
    head.vy += (pool.y - head.y) * 0.025;
    head.vx *= 0.88;
    head.vy *= 0.88;
    head.x += head.vx;
    head.y += head.vy;

    // Organic idle wobble
    head.x += Math.sin(t * 0.6) * 0.0005;
    head.y += Math.cos(t * 0.45) * 0.0003;

    // Chain segments spring toward head
    let leader = head;
    for (let i = 0; i < chain.length; i++) {
      const seg = chain[i];
      if (!seg.attached) { leader = seg; continue; }
      const dx = leader.x - seg.x;
      const dy = leader.y - seg.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      const rest = 0.045;
      if (d > rest) {
        const pull = (d - rest) * 0.14;
        seg.vx += (dx / d) * pull;
        seg.vy += (dy / d) * pull;
      }
      // Spread segments slightly sideways when pooling
      const spreadX = (i - CHAIN_LEN / 2) * 0.015;
      seg.vx += (pool.x + spreadX - seg.x) * 0.005;
      seg.vy += (pool.y - seg.y) * 0.005;
      seg.vx *= 0.88;
      seg.vy *= 0.88;
      seg.x += seg.vx;
      seg.y += seg.vy;
      leader = seg;
    }

    // Once settled, switch to follow mode
    if (poolSettleTimer > 1.2) {
      phase = PHASE_FOLLOW;
    }
  }

  // ======================
  //  PHASE: FOLLOW (scroll-driven)
  // ======================
  if (phase === PHASE_FOLLOW) {
    // Base position: centered, offset by scroll
    const baseX = aspect * 0.5 + Math.sin(t * 0.5) * aspect * 0.12;
    const baseY = 0.15 + scrollOffsetY + Math.cos(t * 0.35) * 0.04;

    // Scroll velocity nudges sideways for organic feel
    head.vx += scrollVelSmooth * 0.00012;

    // Spring toward scroll-offset base position
    head.vx += (baseX - head.x) * 0.012;
    head.vy += (baseY - head.y) * 0.015;

    // Viscous drag
    head.vx *= 0.90;
    head.vy *= 0.90;
    head.x += head.vx;
    head.y += head.vy;

    // Chain follows with stretchy springs
    let leader = head;
    for (let i = 0; i < chain.length; i++) {
      const seg = chain[i];
      if (!seg.attached) {
        // Detached: drift back toward head
        const dx = head.x - seg.x;
        const dy = head.y - seg.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        seg.vx += dx * 0.002;
        seg.vy += dy * 0.002;
        seg.vx *= 0.95;
        seg.vy *= 0.95;
        seg.x += seg.vx;
        seg.y += seg.vy;
        // Reattach if close and scroll is calm
        if (d < 0.09 && Math.abs(scrollVelSmooth) < 4) {
          seg.attached = true;
        }
        continue;
      }

      const dx = leader.x - seg.x;
      const dy = leader.y - seg.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      const rest = 0.05;

      // TEAR OFF if stretched too far during fast scroll
      if (d > TEAR_DIST && Math.abs(scrollVelSmooth) > 15) {
        seg.attached = false;
        if (drops.length < MAX_DROPS) {
          drops.push({
            x: seg.x + (Math.random() - 0.5) * 0.02,
            y: seg.y + (Math.random() - 0.5) * 0.02,
            vx: seg.vx * 0.6 + (Math.random() - 0.5) * 0.004,
            vy: seg.vy * 0.6 + (Math.random() - 0.5) * 0.004,
            r: DROP_R + Math.random() * 0.012,
            life: 1.0,
            age: 0,
          });
        }
        leader = seg;
        continue;
      }

      // Spring force
      if (d > rest) {
        const pull = (d - rest) * 0.13;
        const nx = dx / d, ny = dy / d;
        seg.vx += nx * pull;
        seg.vy += ny * pull;
      }

      seg.vx *= 0.86;
      seg.vy *= 0.86;
      seg.x += seg.vx;
      seg.y += seg.vy;
      leader = seg;
    }

    // Free droplets drift back to head
    for (let i = drops.length - 1; i >= 0; i--) {
      const dr = drops[i];
      dr.age += dt;
      const dx = head.x - dr.x;
      const dy = head.y - dr.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      const pull = dr.age > 1.5 ? 0.0015 : 0.0004;
      dr.vx += dx * pull;
      dr.vy += dy * pull;
      dr.vx *= 0.96;
      dr.vy *= 0.96;
      dr.x += dr.vx;
      dr.y += dr.vy;
      dr.r *= 0.9997;

      // Remove when rejoined or shrunk
      if ((d < 0.1 && dr.age > 2.0) || dr.r < 0.006) {
        drops.splice(i, 1);
      }
    }
  }

  // ======================
  //  RENDER
  // ======================
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);

  let idx = 0;

  // Head — pulses slightly with scroll speed
  const headR = HEAD_R + Math.min(Math.abs(scrollVelSmooth) * 0.0004, 0.03);
  gl.uniform3f(uBlobs[idx], head.x, head.y, headR);
  idx++;

  // Chain
  for (let i = 0; i < chain.length && idx < 16; i++) {
    gl.uniform3f(uBlobs[idx], chain[i].x, chain[i].y, chain[i].r);
    idx++;
  }

  // Drops
  for (let i = 0; i < drops.length && idx < 16; i++) {
    gl.uniform3f(uBlobs[idx], drops[i].x, drops[i].y, drops[i].r);
    idx++;
  }

  gl.uniform1i(uCount, idx);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
