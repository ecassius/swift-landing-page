<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blent — Lava Blob</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:400vh;background:#f5f0eb}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.demo-section{height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:2.5vw;font-weight:200;color:rgba(0,0,0,0.12);user-select:none}
.hero{background:linear-gradient(140deg,#ffd6e5 0%,#ffb3c6 42%,#f07060 100%)}
.demo-section:nth-child(2){background:#1a1a2e;color:rgba(255,255,255,0.1)}
.demo-section:nth-child(3){background:#fff}
.demo-section:nth-child(4){background:#ffd6e5;color:rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div class="demo-section hero">hero section</div>
<div class="demo-section">dark section</div>
<div class="demo-section">white section</div>
<div class="demo-section">pink section</div>

<canvas id="lava-canvas"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('lava-canvas');
const gl = canvas.getContext('webgl', {alpha: true, premultipliedAlpha: false, antialias: false});
if (!gl) return;

const VS = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_center;
uniform float u_radius;
uniform float u_stretch;    // vertical stretch from scroll velocity
uniform float u_scrollPos;  // scroll position for shape evolution

// ---- Noise ----
vec2 hash2(vec2 p){
  p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));
  return -1.0+2.0*fract(sin(p)*43758.5453);
}

float simplex(vec2 p){
  const float K1=0.366025404; // (sqrt(3)-1)/2
  const float K2=0.211324865; // (3-sqrt(3))/6
  vec2 i=floor(p+(p.x+p.y)*K1);
  vec2 a=p-i+(i.x+i.y)*K2;
  float m=step(a.y,a.x);
  vec2 o=vec2(m,1.0-m);
  vec2 b=a-o+K2;
  vec2 c=a-1.0+2.0*K2;
  vec3 h=max(0.5-vec3(dot(a,a),dot(b,b),dot(c,c)),0.0);
  vec3 n=h*h*h*h*vec3(dot(a,hash2(i)),dot(b,hash2(i+o)),dot(c,hash2(i+1.0)));
  return dot(n,vec3(70.0));
}

float fbm(vec2 p){
  float v=0.0, a=0.5;
  mat2 rot=mat2(0.866,0.5,-0.5,0.866);
  for(int i=0;i<5;i++){
    v+=a*simplex(p);
    p=rot*p*2.0;
    a*=0.5;
  }
  return v;
}

// ---- Blob SDF: organic, noise-displaced, stretch-aware ----
float blobSDF(vec2 p, vec2 center, float radius, float stretch){
  vec2 d = p - center;

  // Apply vertical stretch (elongate when scrolling)
  d.y /= (1.0 + abs(stretch) * 0.6);
  // Slight horizontal squash to conserve volume
  d.x *= (1.0 + abs(stretch) * 0.15);

  float dist = length(d);
  float angle = atan(d.y, d.x);

  // Scroll-driven shape evolution — shape morphs as you scroll through the page
  float scrollPhase = u_scrollPos * 0.8;

  // Large organic bulges (slow-moving)
  float bulge = fbm(vec2(angle * 1.2 + scrollPhase, u_time * 0.07)) * 0.40;
  // Medium globular lumps
  float lump = fbm(vec2(angle * 2.5 + scrollPhase * 0.6, u_time * 0.05 + 7.0)) * 0.18;
  // Fine surface undulation
  float fine = simplex(vec2(angle * 5.0, u_time * 0.1 + 15.0)) * 0.06;

  // When still (low stretch), shape is rounder; when scrolling, more distorted
  float stillness = 1.0 / (1.0 + abs(stretch) * 3.0);
  float distortion = bulge + lump + fine;
  distortion = mix(distortion, distortion * 1.4, 1.0 - stillness);

  // Idle wobble when still — gentle undulation
  float wobble = sin(u_time * 0.8 + angle * 2.0) * 0.02 * stillness
               + sin(u_time * 0.5 - angle * 1.5) * 0.015 * stillness;

  float r = radius + radius * (distortion - 0.15) + wobble;

  return dist - r;
}

void main(){
  vec2 uv = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 p = vec2(uv.x * aspect, uv.y);

  float sdf = blobSDF(p, u_center, u_radius, u_stretch);

  // Sharp edge, thin AA
  if(sdf > 0.002) { gl_FragColor = vec4(0,0,0,0); return; }
  float alpha = smoothstep(0.002, -0.001, sdf);

  // ---- Normals from SDF gradient + hemisphere Z ----
  float eps = 0.003;
  float gx = blobSDF(p+vec2(eps,0),u_center,u_radius,u_stretch)
           - blobSDF(p-vec2(eps,0),u_center,u_radius,u_stretch);
  float gy = blobSDF(p+vec2(0,eps),u_center,u_radius,u_stretch)
           - blobSDF(p-vec2(0,eps),u_center,u_radius,u_stretch);
  vec2 grad = vec2(gx, gy) / (2.0 * eps);
  // Hemisphere Z for 3D appearance
  float gz = sqrt(max(1.0 - dot(grad, grad), 0.0));
  vec3 N = normalize(vec3(-grad, gz * 0.6));

  vec3 V = vec3(0, 0, 1);

  // ---- Thickness (distance inside surface) for SSS ----
  float thickness = clamp(-sdf / u_radius, 0.0, 1.0);

  // ---- Surface detail ----
  float turb = fbm(p * 6.0 + u_time * 0.04 + u_scrollPos * 0.3);

  // ---- Modern PBR-ish lighting ----

  // Key light: above-right, warm
  vec3 L1 = normalize(vec3(0.3, 0.5, 1.0));
  // Fill light: left, cool
  vec3 L2 = normalize(vec3(-0.6, -0.2, 0.8));
  // Rim light: behind
  vec3 L3 = normalize(vec3(0.0, -0.8, 0.3));

  float NdotL1 = max(dot(N, L1), 0.0);
  float NdotL2 = max(dot(N, L2), 0.0);
  float NdotV  = max(dot(N, V), 0.01);

  // GGX-inspired specular (simplified)
  float roughness = 0.15;
  float r2 = roughness * roughness;
  vec3 H1 = normalize(L1 + V);
  float NdotH1 = max(dot(N, H1), 0.0);
  float D1 = r2 / (3.14159 * pow(NdotH1 * NdotH1 * (r2 - 1.0) + 1.0, 2.0));
  vec3 H2 = normalize(L2 + V);
  float NdotH2 = max(dot(N, H2), 0.0);
  float D2 = r2 / (3.14159 * pow(NdotH2 * NdotH2 * (r2 - 1.0) + 1.0, 2.0));

  // Fresnel (Schlick) — strong rim for glossy wax look
  float F0 = 0.06;
  float fresnel = F0 + (1.0 - F0) * pow(1.0 - NdotV, 5.0);

  // Fake environment reflection — vertical gradient
  vec3 refl = reflect(-V, N);
  vec3 envColor = mix(
    vec3(0.15, 0.10, 0.35), // warm bottom (deep purple)
    vec3(0.45, 0.40, 0.75), // lighter top
    refl.y * 0.5 + 0.5
  );

  // ---- Color composition ----
  vec3 purple = vec3(0.369, 0.290, 0.855); // #5E4ADA
  vec3 deep   = vec3(0.12, 0.07, 0.35);
  vec3 mid    = vec3(0.30, 0.22, 0.72);

  // Base diffuse
  vec3 diffuse = mix(deep, purple, 0.3 + 0.6 * NdotL1 + 0.15 * NdotL2);

  // Subtle color variation from turbulence
  diffuse = mix(diffuse, mid, turb * 0.15);

  // Specular (GGX)
  vec3 spec = vec3(1.0, 0.97, 0.94) * (D1 * 0.4 + D2 * 0.15);

  // Environment reflection
  vec3 envRefl = envColor * fresnel * 0.5;

  // Subsurface scattering: thin areas glow warmer
  float sss = pow(1.0 - thickness, 2.0) * 0.3;
  vec3 sssColor = vec3(0.50, 0.35, 0.90) * sss;

  // Rim light
  float rim = pow(1.0 - NdotV, 3.5);
  vec3 rimColor = vec3(0.40, 0.32, 0.80) * rim * 0.4;

  // Combine
  vec3 col = diffuse + spec + envRefl + sssColor + rimColor;

  // Depth darkening at edges
  col *= 0.7 + 0.3 * thickness;

  // Micro surface variation
  col *= 0.95 + 0.05 * turb;

  gl_FragColor = vec4(col * alpha, alpha);
}
`;

function mkShader(t,src){
  const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error('Shader error:',gl.getShaderInfoLog(s));return null;}
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

const uRes       = gl.getUniformLocation(prog,'u_res');
const uTime      = gl.getUniformLocation(prog,'u_time');
const uCenter    = gl.getUniformLocation(prog,'u_center');
const uRadius    = gl.getUniformLocation(prog,'u_radius');
const uStretch   = gl.getUniformLocation(prog,'u_stretch');
const uScrollPos = gl.getUniformLocation(prog,'u_scrollPos');

// ==========================================================
//  PHYSICS
// ==========================================================

let w=0, h=0, aspect=1;
let scrollY=0, prevScrollY=0;
let scrollVelSmooth=0;  // smoothed scroll velocity
let stretchSmooth=0;    // smoothed stretch value for shader
let startTime=0;

let blobX=0, blobY=0;
let blobRadius=0;
const BASE_RADIUS = 0.25;

window.addEventListener('scroll', ()=>{ scrollY=window.scrollY; }, {passive:true});

function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 1.5);
  w=window.innerWidth; h=window.innerHeight;
  canvas.width  = Math.floor(w*dpr*0.7);
  canvas.height = Math.floor(h*dpr*0.7);
  aspect = w/h;
  gl.viewport(0,0,canvas.width,canvas.height);
  blobX = aspect*0.5;
}
resize();
window.addEventListener('resize', resize);

function animate(ts){
  requestAnimationFrame(animate);
  if(!startTime) startTime=ts;
  const t = (ts-startTime)*0.001;

  // Scroll velocity
  const scrollVelRaw = scrollY - prevScrollY;
  prevScrollY = scrollY;
  scrollVelSmooth += (scrollVelRaw - scrollVelSmooth) * 0.08;

  // Normalized scroll position (0-1 through the page)
  const maxScroll = document.documentElement.scrollHeight - h;
  const scrollFrac = maxScroll > 0 ? scrollY / maxScroll : 0;

  // ---- Pour: grow radius over first 3 seconds ----
  const pourT = Math.min(t / 3.0, 1.0);
  const pourEase = pourT < 0.5
    ? 4*pourT*pourT*pourT
    : 1 - Math.pow(-2*pourT+2, 3)/2;

  // ---- Blob stays centered, gentle drift ----
  const cx = aspect * 0.5;
  const cy = 0.50;
  blobX = cx + Math.sin(t * 0.2) * 0.02;
  blobY = cy + Math.cos(t * 0.15) * 0.015;

  // During pour, start from top
  if(pourT < 1.0){
    blobY = 1.15 + (cy - 1.15) * pourEase;
    blobX = cx;
  }

  blobRadius = BASE_RADIUS * pourEase;

  // ---- Stretch: scroll velocity → vertical elongation ----
  // Positive stretch = elongated vertically (scrolling down)
  // Decays back to 0 when still (coalesces)
  const targetStretch = scrollVelSmooth * 0.008;
  stretchSmooth += (targetStretch - stretchSmooth) * 0.05; // slow decay = viscous

  // ---- Render ----
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uCenter, blobX, blobY);
  gl.uniform1f(uRadius, blobRadius);
  gl.uniform1f(uStretch, stretchSmooth);
  gl.uniform1f(uScrollPos, scrollFrac);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
