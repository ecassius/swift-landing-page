<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blent — Lava Blob</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:300vh;background:#f5f0eb}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.demo-section{height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:3vw;font-weight:200;color:rgba(0,0,0,0.15);user-select:none}
.demo-section:nth-child(2){background:#1a1a2e;color:rgba(255,255,255,0.12)}
.demo-section:nth-child(3){background:#ffd6e5;color:rgba(0,0,0,0.1)}
</style>
</head>
<body>

<!-- Demo sections to test on different backgrounds -->
<div class="demo-section">scroll to move the blob</div>
<div class="demo-section">works on dark backgrounds too</div>
<div class="demo-section">and on any color</div>

<canvas id="lava-canvas"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('lava-canvas');
const gl = canvas.getContext('webgl', {alpha: true, premultipliedAlpha: false, antialias: false});
if (!gl) return;

// --- SHADERS ---
const VS = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;

const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec3 u_blobs[16]; // x, y, radius
uniform int u_count;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<3;i++){v+=a*noise(p);p*=2.0;a*=0.5;}
  return v;
}

float field(vec2 p){
  float f=0.0;
  for(int i=0;i<16;i++){
    if(i>=u_count) break;
    vec2 d=p-u_blobs[i].xy;
    float r=u_blobs[i].z;
    f+=r*r/(dot(d,d)+0.00005);
  }
  return f;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float aspect=u_res.x/u_res.y;
  vec2 p=vec2(uv.x*aspect,uv.y);

  float f=field(p);

  // Hard-ish threshold for gooey surface tension
  float surface=smoothstep(0.92,1.08,f);
  if(surface<0.005){
    gl_FragColor=vec4(0,0,0,0); // fully transparent
    return;
  }

  // Gradient for pseudo-3D normal
  float eps=0.002;
  float fx=field(p+vec2(eps,0))-field(p-vec2(eps,0));
  float fy=field(p+vec2(0,eps))-field(p-vec2(0,eps));
  vec3 normal=normalize(vec3(-fx,-fy,0.5));

  // Subtle surface distortion
  float turb=fbm(p*10.0+u_time*0.12);

  // Lighting — two-point for rich oily sheen
  vec3 L1=normalize(vec3(0.5,-0.4,1.0));
  vec3 L2=normalize(vec3(-0.6,0.5,0.7));
  vec3 V=vec3(0,0,1);

  float d1=max(dot(normal,L1),0.0);
  float d2=max(dot(normal,L2),0.0);
  float s1=pow(max(dot(reflect(-L1,normal),V),0.0),50.0);
  float s2=pow(max(dot(reflect(-L2,normal),V),0.0),30.0);
  float fresnel=pow(1.0-max(dot(normal,V),0.0),2.5);

  // Exact SVG colors
  vec3 purple=vec3(0.369,0.290,0.855); // #5E4ADA
  vec3 deep=vec3(0.18,0.12,0.50);
  vec3 lite=vec3(0.50,0.42,0.95);

  vec3 col=mix(deep,purple,0.4+0.6*(d1*0.7+d2*0.3));
  col=mix(col,lite,turb*0.12);
  col+=vec3(1.0,0.97,0.94)*(s1*0.75+s2*0.35);
  col+=purple*fresnel*0.25;
  col*=0.93+0.07*turb;

  // Edge depth
  float edge=smoothstep(0.92,1.6,f);
  col*=0.75+0.25*edge;

  float alpha=surface*0.95;
  gl_FragColor=vec4(col*alpha,alpha);
}
`;

// --- GL setup ---
function mkShader(t,src){
  const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'u_res');
const uTime=gl.getUniformLocation(prog,'u_time');
const uCount=gl.getUniformLocation(prog,'u_count');
const uBlobs=[];
for(let i=0;i<16;i++) uBlobs[i]=gl.getUniformLocation(prog,'u_blobs['+i+']');

// --- BLOB PHYSICS ---
// One main body made of a head + chain of trailing segments
// Fast scroll = stretch. Very fast = segments tear off into free droplets.

const HEAD_R = 0.07;  // main blob radius
const SEG_R = 0.05;   // segment radius
const DROP_R = 0.025;  // torn droplet radius
const CHAIN_LEN = 5;  // segments trailing the head
const MAX_DROPS = 8;  // max free droplets
const TEAR_DIST = 0.18; // distance at which a segment tears off
const REJOIN_FORCE = 0.0004; // how fast drops drift back

// Head
const head = {x:0.8, y:0.5, vx:0, vy:0};

// Chain segments — follow the head like a snake
const chain = [];
for(let i=0;i<CHAIN_LEN;i++){
  chain.push({
    x: 0.8,
    y: 0.5 - (i+1)*0.06,
    vx: 0, vy: 0,
    r: SEG_R * (1 - i*0.06),
    attached: true,
  });
}

// Free droplets (torn off pieces)
const drops = [];

let scrollY = 0;
let prevScrollY = 0;
let scrollVelY = 0;
let scrollVelSmooth = 0;
let w=0,h=0,aspect=1;

window.addEventListener('scroll',()=>{scrollY=window.scrollY;},{passive:true});

function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,1.5);
  w=window.innerWidth; h=window.innerHeight;
  canvas.width=Math.floor(w*dpr*0.6);
  canvas.height=Math.floor(h*dpr*0.6);
  aspect=w/h;
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
window.addEventListener('resize',resize);

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

function animate(ts){
  requestAnimationFrame(animate);
  const t=ts*0.001;
  const dt=1/60;

  const maxScroll=document.documentElement.scrollHeight-window.innerHeight;
  const scrollFrac=maxScroll>0?scrollY/maxScroll:0;
  scrollVelY=(scrollY-prevScrollY);
  prevScrollY=scrollY;
  scrollVelSmooth+=(scrollVelY-scrollVelSmooth)*0.15;

  // --- Head movement ---
  // Head drifts in a lazy path, pushed by scroll
  const baseX = aspect*0.5 + Math.sin(t*0.4)*aspect*0.15;
  const baseY = 0.35 + scrollFrac*0.35 + Math.cos(t*0.3)*0.08;

  // Scroll velocity pushes the head sideways and down
  head.vx += scrollVelSmooth * 0.00008;
  head.vy -= scrollVelSmooth * 0.00015; // scroll down = blob moves down in GL coords

  // Spring toward the lazy base path
  head.vx += (baseX - head.x) * 0.008;
  head.vy += (baseY - head.y) * 0.008;

  // Heavy viscous drag
  head.vx *= 0.92;
  head.vy *= 0.92;

  head.x += head.vx;
  head.y += head.vy;

  // --- Chain segments follow head ---
  let leader = head;
  for(let i=0;i<chain.length;i++){
    const seg=chain[i];
    if(!seg.attached) continue;

    const dx=leader.x-seg.x;
    const dy=leader.y-seg.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    const restLen=0.055;

    // Check for tearing
    if(d > TEAR_DIST && Math.abs(scrollVelSmooth) > 12){
      // Tear off! becomes a free droplet
      seg.attached=false;
      if(drops.length < MAX_DROPS){
        drops.push({
          x:seg.x, y:seg.y,
          vx:seg.vx*0.5+(Math.random()-0.5)*0.003,
          vy:seg.vy*0.5+(Math.random()-0.5)*0.003,
          r:DROP_R+Math.random()*0.015,
          life:1.0,
          reattachTimer:0,
        });
      }
      continue;
    }

    // Spring + damping toward leader
    const force=Math.max(0,(d-restLen))*0.15;
    const nx=d>0.001?dx/d:0;
    const ny=d>0.001?dy/d:0;

    seg.vx += nx*force;
    seg.vy += ny*force;

    // Extra drag for viscous feel
    seg.vx *= 0.88;
    seg.vy *= 0.88;

    seg.x += seg.vx;
    seg.y += seg.vy;

    leader=seg;
  }

  // Reattach detached chain segments over time
  for(let i=0;i<chain.length;i++){
    if(!chain[i].attached){
      const target = i===0 ? head : chain[i-1];
      if(target.attached || i===0){
        const dx=target.x-chain[i].x;
        const dy=target.y-chain[i].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        chain[i].vx += dx*0.003;
        chain[i].vy += dy*0.003;
        chain[i].vx *= 0.95;
        chain[i].vy *= 0.95;
        chain[i].x += chain[i].vx;
        chain[i].y += chain[i].vy;
        if(d < 0.08 && Math.abs(scrollVelSmooth) < 5){
          chain[i].attached=true;
        }
      }
    }
  }

  // --- Free droplets ---
  for(let i=drops.length-1;i>=0;i--){
    const dr=drops[i];
    // Drift back toward head
    const dx=head.x-dr.x;
    const dy=head.y-dr.y;
    const d=Math.sqrt(dx*dx+dy*dy);

    dr.reattachTimer+=dt;
    const pullStrength = dr.reattachTimer > 1.5 ? REJOIN_FORCE*3 : REJOIN_FORCE;

    dr.vx += dx*pullStrength;
    dr.vy += dy*pullStrength;
    dr.vx *= 0.96;
    dr.vy *= 0.96;
    dr.x += dr.vx;
    dr.y += dr.vy;

    // Shrink over time
    dr.life -= 0.001;
    dr.r *= 0.9995;

    // Remove if rejoined or dead
    if(d < 0.1 && dr.reattachTimer > 2.0){
      drops.splice(i,1);
    } else if(dr.life <= 0 || dr.r < 0.005){
      drops.splice(i,1);
    }
  }

  // --- Render ---
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uTime,t);

  // Pack all blobs: head + chain + drops
  let idx=0;

  // Head — size pulses slightly with scroll velocity
  const headPulse = HEAD_R + Math.abs(scrollVelSmooth)*0.0003;
  gl.uniform3f(uBlobs[idx],head.x,head.y,Math.min(headPulse,0.11));
  idx++;

  // Chain segments
  for(let i=0;i<chain.length && idx<16;i++){
    const s=chain[i];
    gl.uniform3f(uBlobs[idx],s.x,s.y,s.r);
    idx++;
  }

  // Free droplets
  for(let i=0;i<drops.length && idx<16;i++){
    gl.uniform3f(uBlobs[idx],drops[i].x,drops[i].y,drops[i].r);
    idx++;
  }

  gl.uniform1i(uCount,idx);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
