<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blent — Lava Blob</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:400vh;background:#f5f0eb}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.demo-section{height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:2.5vw;font-weight:200;color:rgba(0,0,0,0.12);user-select:none}
.hero{background:linear-gradient(140deg,#ffd6e5 0%,#ffb3c6 42%,#f07060 100%)}
.demo-section:nth-child(2){background:#1a1a2e;color:rgba(255,255,255,0.1)}
.demo-section:nth-child(3){background:#fff}
.demo-section:nth-child(4){background:#ffd6e5;color:rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div class="demo-section hero">hero section</div>
<div class="demo-section">dark section</div>
<div class="demo-section">white section</div>
<div class="demo-section">pink section</div>

<canvas id="lava-canvas"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('lava-canvas');
const gl = canvas.getContext('webgl', {alpha: true, premultipliedAlpha: false, antialias: false});
if (!gl) return;

const VS = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}`;

// Single large blob — 3 tightly-coupled metaballs that act as one organic mass
// No droplets, no tearing. Just one thick viscous form that stretches.
const FS = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec3 u_blobs[6];
uniform int u_count;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<4;i++){v+=a*noise(p);p*=2.0;a*=0.5;}
  return v;
}

float field(vec2 p){
  float f=0.0;
  for(int i=0;i<6;i++){
    if(i>=u_count) break;
    vec2 d=p-u_blobs[i].xy;
    float r=u_blobs[i].z;
    f+=r*r/(dot(d,d)+0.00005);
  }
  return f;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float aspect=u_res.x/u_res.y;
  vec2 p=vec2(uv.x*aspect,uv.y);

  float f=field(p);

  // Low threshold = individual balls vanish into one smooth fluid
  float surface=smoothstep(0.35,0.55,f);
  if(surface<0.005){
    gl_FragColor=vec4(0,0,0,0);
    return;
  }

  // Normal from gradient — wide eps for smooth normals
  float eps=0.006;
  float fx=field(p+vec2(eps,0))-field(p-vec2(eps,0));
  float fy=field(p+vec2(0,eps))-field(p-vec2(0,eps));
  vec3 normal=normalize(vec3(-fx,-fy,0.4));

  // Rich turbulence for oily viscous surface
  float turb=fbm(p*6.0+u_time*0.08);
  float turb2=fbm(p*12.0-u_time*0.05+vec2(3.7,1.2));

  // Two-point lighting for glossy oil
  vec3 L1=normalize(vec3(0.5,-0.4,1.0));
  vec3 L2=normalize(vec3(-0.6,0.5,0.7));
  vec3 V=vec3(0,0,1);

  float d1=max(dot(normal,L1),0.0);
  float d2=max(dot(normal,L2),0.0);
  float s1=pow(max(dot(reflect(-L1,normal),V),0.0),55.0);
  float s2=pow(max(dot(reflect(-L2,normal),V),0.0),35.0);
  float fresnel=pow(1.0-max(dot(normal,V),0.0),2.8);

  // #5E4ADA purple palette
  vec3 purple=vec3(0.369,0.290,0.855);
  vec3 deep=vec3(0.15,0.10,0.42);
  vec3 lite=vec3(0.52,0.44,0.96);

  // Mix colors with turbulence for oily shifting
  vec3 col=mix(deep,purple,0.35+0.65*(d1*0.7+d2*0.3));
  col=mix(col,lite,turb*0.15+turb2*0.05);

  // Strong specular for wet oily sheen
  col+=vec3(1.0,0.97,0.94)*(s1*0.8+s2*0.4);

  // Fresnel rim glow
  col+=purple*fresnel*0.3;

  // Surface texture variation
  col*=0.90+0.10*turb;

  // Depth at edges
  float edge=smoothstep(0.35,2.0,f);
  col*=0.72+0.28*edge;

  float alpha=surface*0.96;
  gl_FragColor=vec4(col*alpha,alpha);
}
`;

function mkShader(t,src){
  const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aP);
gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'u_res');
const uTime=gl.getUniformLocation(prog,'u_time');
const uCount=gl.getUniformLocation(prog,'u_count');
const uBlobs=[];
for(let i=0;i<6;i++) uBlobs[i]=gl.getUniformLocation(prog,'u_blobs['+i+']');

// ==========================================================
//  PHYSICS — One big blob (3 linked masses), slow & viscous
// ==========================================================

// 3 blobs: one large center + two flanking — they merge into one shape
// via the metaball field. When scrolling, the flanking ones lag behind
// creating a stretch effect. No tearing, no droplets.

const R_MAIN = 0.16;   // big center blob
const R_FLANK = 0.11;  // flanking blobs
const R_SMALL = 0.07;  // small accent

let w = 0, h = 0, aspect = 1;
let scrollY = 0, prevScrollY = 0, scrollVelSmooth = 0;
let startTime = 0;

// Blob positions in GL space (aspect-corrected x, y 0-1)
const blobs = [
  { x:0, y:1.8, vx:0, vy:0, r:R_MAIN },   // main center
  { x:0, y:2.0, vx:0, vy:0, r:R_FLANK },   // flank top
  { x:0, y:2.2, vx:0, vy:0, r:R_FLANK },   // flank bottom
  { x:0, y:2.4, vx:0, vy:0, r:R_SMALL },   // small trailing accent
];

// Target Y when "pooled" at hero center
const POOL_Y = 0.50;
// How far the pour has progressed (0 = above screen, 1 = pooled)
let pourProgress = 0;
let pooled = false;

window.addEventListener('scroll', () => { scrollY = window.scrollY; }, { passive: true });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  w = window.innerWidth; h = window.innerHeight;
  canvas.width  = Math.floor(w * dpr * 0.7);
  canvas.height = Math.floor(h * dpr * 0.7);
  aspect = w / h;
  gl.viewport(0, 0, canvas.width, canvas.height);

  const cx = aspect * 0.5;
  for (const b of blobs) b.x = cx;
}
resize();
window.addEventListener('resize', resize);

function animate(ts) {
  requestAnimationFrame(animate);
  if (!startTime) startTime = ts;
  const t = (ts - startTime) * 0.001;

  const scrollVelY = scrollY - prevScrollY;
  prevScrollY = scrollY;
  scrollVelSmooth += (scrollVelY - scrollVelSmooth) * 0.08; // smooth slowly

  const cx = aspect * 0.5;

  // Scroll offset: maps page scroll to GL Y movement
  // Moves ~0.5 GL units per viewport of scroll (slow, stays on screen)
  const scrollGLOffset = -(scrollY / h) * 0.5;

  // ========================
  //  POUR PHASE (first ~3 seconds)
  // ========================
  if (!pooled) {
    // Slow, deliberate pour — takes about 2.5 seconds
    pourProgress += 0.006; // ~0.6% per frame = ~2.7s to complete

    if (pourProgress >= 1.0) {
      pourProgress = 1.0;
      pooled = true;
    }

    // Ease: slow start, slow end (smoothstep)
    const ease = pourProgress * pourProgress * (3 - 2 * pourProgress);

    // Main blob pours from above (y=1.8) to pool center (y=POOL_Y)
    // Staggered: main arrives first, flanks follow, small last
    const mainT  = Math.min(1, ease * 1.4);
    const flankT = Math.min(1, Math.max(0, ease * 1.4 - 0.15));
    const smallT = Math.min(1, Math.max(0, ease * 1.4 - 0.3));

    const mainE  = mainT * mainT * (3 - 2 * mainT);
    const flankE = flankT * flankT * (3 - 2 * flankT);
    const smallE = smallT * smallT * (3 - 2 * smallT);

    blobs[0].y = 1.8 + (POOL_Y - 1.8) * mainE;
    blobs[0].x = cx + Math.sin(t * 1.5) * 0.01 * mainE;

    blobs[1].y = 2.0 + (POOL_Y + 0.06 - 2.0) * flankE;
    blobs[1].x = cx - 0.04 * flankE + Math.sin(t * 1.2 + 1) * 0.008 * flankE;

    blobs[2].y = 2.2 + (POOL_Y - 0.06 - 2.2) * flankE;
    blobs[2].x = cx + 0.04 * flankE + Math.sin(t * 1.0 + 2) * 0.008 * flankE;

    blobs[3].y = 2.4 + (POOL_Y - 0.1 - 2.4) * smallE;
    blobs[3].x = cx + 0.06 * smallE;

    // Grow radii as they enter (start as a thin stream, fatten)
    blobs[0].r = R_MAIN * (0.3 + 0.7 * mainE);
    blobs[1].r = R_FLANK * (0.2 + 0.8 * flankE);
    blobs[2].r = R_FLANK * (0.2 + 0.8 * flankE);
    blobs[3].r = R_SMALL * (0.2 + 0.8 * smallE);
  }

  // ========================
  //  SCROLL-FOLLOW (after pooled)
  // ========================
  if (pooled) {
    // Base positions — centered, gentle organic drift
    const driftX = Math.sin(t * 0.3) * 0.03;
    const driftY = Math.cos(t * 0.22) * 0.015;

    // Target Y follows scroll slowly
    const targetY = POOL_Y + scrollGLOffset + driftY;
    const targetX = cx + driftX;

    // Main blob: spring toward target (slow, heavy)
    blobs[0].vx += (targetX - blobs[0].x) * 0.006;
    blobs[0].vy += (targetY - blobs[0].y) * 0.006;
    // Scroll velocity nudge (subtle)
    blobs[0].vx += scrollVelSmooth * 0.000025;
    // Very heavy drag = viscous
    blobs[0].vx *= 0.93;
    blobs[0].vy *= 0.93;
    blobs[0].x += blobs[0].vx;
    blobs[0].y += blobs[0].vy;
    blobs[0].r = R_MAIN + Math.sin(t * 0.4) * 0.005;

    // Flanking blobs: follow main with lag (creates stretch on scroll)
    for (let i = 1; i < blobs.length; i++) {
      const b = blobs[i];
      const leader = blobs[0];

      // Each flank has a slightly offset rest position
      const offX = (i === 1 ? -0.04 : i === 2 ? 0.04 : 0.0) + Math.sin(t * 0.35 + i * 2) * 0.02;
      const offY = (i === 1 ? 0.06 : i === 2 ? -0.06 : -0.12) + Math.cos(t * 0.28 + i * 1.5) * 0.015;

      const tx = leader.x + offX;
      const ty = leader.y + offY;

      // Softer spring = more lag = more stretch when scrolling
      const stiffness = i === 3 ? 0.003 : 0.004;
      b.vx += (tx - b.x) * stiffness;
      b.vy += (ty - b.y) * stiffness;
      b.vx *= 0.91;
      b.vy *= 0.91;
      b.x += b.vx;
      b.y += b.vy;

      // Subtle radius breathing
      b.r = (i === 3 ? R_SMALL : R_FLANK) + Math.sin(t * 0.5 + i) * 0.004;
    }
  }

  // ========================
  //  RENDER
  // ========================
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform1i(uCount, blobs.length);

  for (let i = 0; i < blobs.length; i++) {
    gl.uniform3f(uBlobs[i], blobs[i].x, blobs[i].y, blobs[i].r);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(animate);
})();
</script>
</body>
</html>
